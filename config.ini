[SETTINGS]
# Ollama Server URL (Standard: http://localhost:11434)
OLLAMA_URL = http://localhost:11434

# Modellname wie in Ollama registriert
LLM_MODEL = gemma4:e4b

# Whisper Modellgröße: tiny, base, small, medium, large-v3, large-v3-turbo
WHISPER_MODEL = large-v3-turbo

# Whisper Rechengenauigkeit: int8 (spart VRAM), float16 (bessere Qualität)
WHISPER_COMPUTE_TYPE = int8

# Chunk-Dauer in Sekunden für Pseudo-Streaming (empfohlen: 6-8 für bessere Spracherkennung)
CHUNK_DURATION = 7